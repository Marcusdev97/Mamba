<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>发送台 · Mamba</title>
<link rel="stylesheet" href="/assets/mamba.css" />
<style>
  /* 发送台壳: 一个 program、两个 tab。每个 tab 承载现有页面 (iframe),
     切换时两边都保持活着 — 正在跑的 blast 进度不会因为切 tab 而丢。
     真正的 DOM 级合并等这个壳跑稳后再做 (两页 element id 有冲突, 硬合高风险)。 */
  html, body { height: 100%; margin: 0; }
  body { display: flex; flex-direction: column; background: var(--bg, #0b1120); }
  .sendbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 10px 18px; border-bottom: 1px solid var(--line, #1f2a3d);
    background: var(--panel, #0f172a);
  }
  .sendbar h1 { margin: 0; font-size: 17px; color: var(--text, #e2e8f0); }
  .tabs { display: flex; gap: 8px; margin-left: 8px; }
  .tab {
    padding: 8px 18px; border-radius: 10px; border: 1px solid var(--line, #334155);
    background: transparent; color: var(--muted, #94a3b8); cursor: pointer;
    font-weight: 700; font-size: 13.5px; font-family: inherit;
  }
  .tab.active { background: var(--panel-2, #1e293b); color: var(--text, #e2e8f0); border-color: #38bdf8; }
  .tab .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #38bdf8; margin-right: 7px; vertical-align: 1px; opacity: 0; }
  .tab.running .dot { opacity: 1; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .25; } }
  .spacer { flex: 1; }
  .sendbar a { color: var(--muted, #94a3b8); text-decoration: none; font-size: 13px; }
  .sendbar a:hover { color: var(--text, #e2e8f0); }
  .monitor-toggle {
    display: inline-flex; align-items: center; gap: 7px; min-height: 34px;
    padding: 7px 11px; border: 1px solid #334155; border-radius: 8px;
    background: #111827; color: #cbd5e1; font: inherit; font-size: 12px;
    font-weight: 800; cursor: pointer; white-space: nowrap;
  }
  .monitor-toggle:hover { border-color: #475569; color: #f8fafc; }
  .monitor-toggle .monitor-chevron { font-size: 11px; transition: transform .18s ease; }
  .monitor-toggle.collapsed .monitor-chevron { transform: rotate(180deg); }
  .monitor-toggle .monitor-count {
    min-width: 20px; padding: 2px 6px; border-radius: 999px;
    background: #163524; color: #4ade80; text-align: center;
  }
  .monitor-restore {
    min-height: 34px; padding: 7px 11px; border: 1px solid #475569; border-radius: 8px;
    background: #18212f; color: #cbd5e1; font: inherit; font-size: 12px;
    font-weight: 800; cursor: pointer; white-space: nowrap;
  }
  .monitor-restore:hover { border-color: #38bdf8; color: #f8fafc; }
  .monitor-restore.hidden { display: none; }
  .queuebar {
    display: flex; align-items: center; gap: 10px; min-width: 0;
    padding: 7px 12px; border: 1px solid #334155; border-radius: 7px;
    background: #111827; color: #cbd5e1; font-size: 12.5px;
  }
  .queuebar.hidden { display: none; }
  .queuebar strong { color: #fbbf24; white-space: nowrap; }
  .queuebar span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 360px; }
  .queuebar.held { border-color: #92400e; background: #291b0d; color: #fcd34d; }
  .queuebar button {
    border: 1px solid #475569; border-radius: 6px; padding: 5px 8px;
    background: #1f2937; color: #e5e7eb; font: inherit; cursor: pointer; white-space: nowrap;
  }
  .queuebar button.danger { border-color: #7f1d1d; color: #fca5a5; }
  .campaign-monitors { display: grid; border-bottom: 1px solid var(--line, #1f2a3d); background: #0b1018; }
  .campaign-monitors.collapsed { display: none; }
  .campaign-monitor {
    display: grid; grid-template-columns: minmax(220px, 1.35fr) minmax(300px, 2fr);
    gap: 18px; padding: 12px 18px; border-bottom: 1px solid #1b2636;
    background: #0b1018; color: #e5e7eb;
  }
  .campaign-monitor:last-child { border-bottom: 0; }
  .monitor-summary { min-width: 0; display: grid; align-content: center; gap: 7px; }
  .monitor-head { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .monitor-kicker { color: #94a3b8; font-size: 11px; font-weight: 800; text-transform: uppercase; }
  .lane-dismiss {
    margin-left: auto; border: 1px solid #475569; border-radius: 6px; padding: 4px 8px;
    background: #18212f; color: #cbd5e1; font: inherit; font-size: 11px; font-weight: 800; cursor: pointer;
  }
  .lane-dismiss:hover { border-color: #64748b; color: #fff; }
  .monitor-title-row { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
  .monitor-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 15px; font-weight: 800; }
  .monitor-percent { margin-left: auto; color: #2dd36f; font-size: 17px; font-weight: 800; }
  .monitor-sender { color: #7dd3fc; font-size: 12px; font-weight: 800; white-space: nowrap; }
  .lane-stop {
    border: 1px solid #7f1d1d; border-radius: 6px; padding: 4px 8px;
    background: #241216; color: #fca5a5; font: inherit; font-size: 11px; font-weight: 800; cursor: pointer;
  }
  .lane-stop:disabled { opacity: .4; cursor: default; }
  .monitor-track { height: 7px; overflow: hidden; border-radius: 4px; background: #243041; }
  .monitor-track span {
    display: block; width: 0; height: 100%; border-radius: inherit;
    background: #2dd36f; transition: width .45s ease;
  }
  .monitor-track.running span {
    background-image: linear-gradient(90deg, #16a34a 0 35%, #4ade80 50%, #16a34a 65% 100%);
    background-size: 180px 100%; animation: monitorMove 1.4s linear infinite;
  }
  @keyframes monitorMove { to { background-position: 180px 0; } }
  .monitor-meta { display: flex; gap: 12px; align-items:center; flex-wrap:wrap; color: #94a3b8; font-size: 11.5px; white-space: nowrap; }
  .monitor-meta b { color: #dbe4ef; }
  .monitor-meta .meta-skip b { color:#fbbf24; }
  .monitor-meta .meta-fail b { color:#fca5a5; }
  .flow-steps { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; align-items: stretch; }
  .flow-step {
    position: relative; min-width: 0; padding: 9px 10px; border: 1px solid #283447;
    border-radius: 7px; background: #121923;
  }
  .flow-step::after {
    content: ""; position: absolute; top: 50%; right: -9px; width: 9px; height: 1px; background: #334155;
  }
  .flow-step:last-child::after { display: none; }
  .flow-step small { display: block; color: #64748b; font-size: 10px; font-weight: 800; text-transform: uppercase; }
  .flow-step strong { display: block; overflow: hidden; margin-top: 3px; color: #cbd5e1; font-size: 12px; text-overflow: ellipsis; white-space: nowrap; }
  .flow-step.done { border-color: #14532d; background: #0c2118; }
  .flow-step.done small, .flow-step.done strong { color: #4ade80; }
  .flow-step.active { border-color: #16a34a; background: #10291c; box-shadow: inset 3px 0 #2dd36f; }
  .flow-step.active small { color: #86efac; }
  .flow-step.active strong { color: #f0fdf4; }
  .flow-step.held { border-color: #92400e; background: #291b0d; }
  .flow-step.held small, .flow-step.held strong { color: #fbbf24; }
  @media (max-width: 760px) {
    .campaign-monitor { grid-template-columns: 1fr; gap: 10px; padding: 10px 14px; }
    .flow-steps { gap: 5px; }
    .flow-step { padding: 7px 6px; }
    .flow-step strong { font-size: 10.5px; }
    .monitor-meta { gap: 9px; }
  }
  .frames { flex: 1; position: relative; }
  .frames iframe {
    position: absolute; inset: 0; width: 100%; height: 100%; border: 0;
    background: transparent;
  }
  .frames iframe.hidden { visibility: hidden; pointer-events: none; }
  .sync-overlay {
    position: fixed; inset: 0; z-index: 9999; display: grid; place-items: center;
    padding: 24px; background: rgba(3, 7, 18, .78); backdrop-filter: blur(8px);
  }
  .sync-overlay.hidden { display: none; }
  .sync-dialog {
    width: min(440px, calc(100vw - 48px)); padding: 28px;
    border: 1px solid #334155; border-radius: 8px; background: #111827;
    color: #e5e7eb; box-shadow: 0 24px 70px rgba(0, 0, 0, .45);
  }
  .sync-head { display: flex; align-items: center; gap: 14px; }
  .sync-icon {
    width: 42px; height: 42px; display: grid; place-items: center; flex: 0 0 42px;
    border-radius: 50%; background: #0f2f23; color: #2dd36f; font-size: 21px;
  }
  .sync-icon.spinning { border: 3px solid #244235; border-top-color: #2dd36f; background: transparent; animation: spin .8s linear infinite; }
  .sync-overlay.failed .sync-icon { background: #3a171d; color: #ff5f67; }
  .sync-overlay.succeeded .sync-icon { background: #123523; color: #2dd36f; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sync-dialog h2 { margin: 0; font-size: 20px; letter-spacing: 0; }
  .sync-message { margin: 16px 0 8px; color: #cbd5e1; line-height: 1.55; }
  .sync-detail { margin: 0; color: #94a3b8; font-size: 13px; line-height: 1.5; overflow-wrap: anywhere; }
  .sync-track { height: 5px; margin-top: 20px; overflow: hidden; border-radius: 3px; background: #263244; }
  .sync-track span { display: block; width: 38%; height: 100%; background: #2dd36f; animation: loading 1.25s ease-in-out infinite; }
  @keyframes loading { from { transform: translateX(-105%); } to { transform: translateX(365%); } }
  .sync-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 9px; margin-top: 20px; }
  .sync-actions button {
    border: 1px solid #475569; border-radius: 7px; padding: 9px 14px;
    background: #1f2937; color: #e5e7eb; font: inherit; font-weight: 700; cursor: pointer;
  }
  .sync-actions button.primary { border-color: #16a34a; background: #16a34a; color: #04130a; }
  .sync-actions button:disabled { opacity: .55; cursor: wait; }
</style>
<script src="/assets/mamba-shell.js" defer></script>
</head>
<body>
  <div class="sendbar">
    <h1>📣 发送台</h1>
    <div class="tabs">
      <button class="tab active" id="tab-flow1" onclick="show('flow1')"><span class="dot"></span>① Flow 1 · 新名单群发</button>
      <button class="tab" id="tab-next" onclick="show('next')"><span class="dot"></span>② Flow 2-10 · 跟进</button>
    </div>
    <div class="spacer"></div>
    <div class="queuebar hidden" id="queueBar">
      <strong id="queueCount"></strong>
      <span id="queueDetail"></span>
      <button type="button" class="hidden" id="queueRelease">确认后启动</button>
      <button type="button" class="danger" id="queueCancel">取消下一批</button>
    </div>
    <button type="button" class="monitor-toggle" id="monitorToggle" aria-controls="campaignMonitors" aria-expanded="true">
      <span class="monitor-chevron">▴</span>
      <span id="monitorToggleLabel">收起进度</span>
      <span class="monitor-count" id="monitorCount">0</span>
    </button>
    <button type="button" class="monitor-restore hidden" id="monitorRestore">恢复已关闭</button>
    <button type="button" class="monitor-restore hidden" id="monitorClearDone" title="把所有已结束的 campaign 从清单移除；发送纪录仍会保留">清掉已结束</button>
    <a href="/knowledge">🧠 脑编辑器</a>
    <a href="/bot-rules">Bot Rules</a>
    <a href="/settings">Settings</a>
  </div>
  <section class="campaign-monitors" id="campaignMonitors" aria-label="Campaign live progress"></section>
  <div class="frames">
    <iframe id="frame-flow1" src="/flow-1"></iframe>
    <iframe id="frame-next" class="hidden" data-src="/next-flow"></iframe>
  </div>
  <div class="sync-overlay hidden" id="syncOverlay" role="dialog" aria-modal="true" aria-live="assertive">
    <div class="sync-dialog">
      <div class="sync-head">
        <div class="sync-icon" id="syncIcon">✓</div>
        <h2 id="syncTitle">正在更新 Notion</h2>
      </div>
      <p class="sync-message" id="syncMessage"></p>
      <p class="sync-detail" id="syncDetail"></p>
      <div class="sync-track" id="syncTrack"><span></span></div>
      <div class="sync-actions hidden" id="syncActions">
        <button type="button" class="primary hidden" id="syncRecover">安全恢复未完成发送</button>
        <button type="button" class="primary hidden" id="syncRetry">只重试 Notion</button>
        <button type="button" id="syncClose">查看发送详情</button>
      </div>
    </div>
  </div>

<script>
// 第二个 tab 懒加载 (第一次点才载入), 之后一直活着 — 切 tab 不打断任何进行中的发送。
function show(which) {
  const next = document.getElementById("frame-next");
  if (which === "next" && !next.src) next.src = next.dataset.src;
  document.getElementById("frame-flow1").classList.toggle("hidden", which !== "flow1");
  next.classList.toggle("hidden", which !== "next");
  document.getElementById("tab-flow1").classList.toggle("active", which === "flow1");
  document.getElementById("tab-next").classList.toggle("active", which === "next");
  try { history.replaceState(null, "", "#" + which); } catch {}
}
// 深链接: /send#next 直接开第二个 tab (launcher 用)
if (location.hash === "#next") show("next");

let syncBusy = false;
let successTimer = null;
let firstQueuedRunId = null;
let latestCampaignStatus = null;
let latestCampaignQueue = null;
let activeSyncContext = null;
let monitorDisplayChoice = sessionStorage.getItem("mamba-send-monitor-display");
const dismissedRunsKey = "mamba-send-dismissed-runs-v1";
let dismissedCampaignRuns = loadDismissedCampaignRuns();

const terminalStatuses = new Set([
  "SENT", "REPLIED_WARM", "FAILED", "SKIPPED_END_TIME", "SKIPPED_MANUAL",
  "SKIPPED_SUPPRESSED", "SKIPPED_REPLIED", "SKIPPED_NO_WHATSAPP", "PART1_ONLY_END_TIME",
]);

function monitorOutcomes(state, assignments, summary) {
  if (state?.outcomes) return state.outcomes;
  const total = Number(state?.total || assignments.length || 0);
  const result = { total, processed:0, contacted:0, pending:0, skipped:0, noWhatsapp:0, failed:0, percent:0 };
  const items = assignments.length ? assignments : Object.entries(summary).flatMap(([status, count]) =>
    Array.from({ length:Number(count || 0) }, () => ({ status }))
  );
  for (const item of items) {
    const status = String(item.status || "");
    if (status === "QUEUED" || /^(WAITING|SENDING)_PART\d+$/.test(status)) result.pending += 1;
    else if (status === "FAILED") result.failed += 1;
    else if (status === "SKIPPED_NO_WHATSAPP") { result.skipped += 1; result.noWhatsapp += 1; }
    else if (status.startsWith("SKIPPED_")) result.skipped += 1;
    else if (item.part1At || ["SENT","REPLIED_WARM","PART1_ONLY_END_TIME"].includes(status)) result.contacted += 1;
    else result.skipped += 1;
  }
  result.processed = Math.max(0, total - result.pending);
  result.percent = total ? Math.min(100, Math.round(result.processed / total * 100)) : 0;
  return result;
}

function monitorEscape(value) {
  return String(value ?? "").replace(/[&<>\"]/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[char]));
}

function loadDismissedCampaignRuns() {
  try {
    const parsed = JSON.parse(localStorage.getItem(dismissedRunsKey) || "{}");
    return Object.fromEntries(Object.entries(parsed).filter(([runId, dismissedAt]) =>
      runId && Number.isFinite(Number(dismissedAt))
    ));
  } catch {
    return {};
  }
}

function saveDismissedCampaignRuns() {
  // Keep the newest 200 closed cards. This stays tiny but, unlike a temporary
  // collapse, a closed Batch never comes back by itself after refresh/restart.
  dismissedCampaignRuns = Object.fromEntries(
    Object.entries(dismissedCampaignRuns).sort((a, b) => Number(b[1]) - Number(a[1])).slice(0, 200)
  );
  try { localStorage.setItem(dismissedRunsKey, JSON.stringify(dismissedCampaignRuns)); } catch {}
}

function dismissCampaignRun(runId) {
  if (!runId) return;
  dismissedCampaignRuns[runId] = Date.now();
  saveDismissedCampaignRuns();
}

// 真的从 active-runs.json 移除（localStorage 那份只是本机隐藏，换台电脑就回来了）。
// 发送回执留在 campaign-data/runs/ 不动 —— 那是查帐依据，也是防重发的资料来源。
async function forgetCampaignRun(runId, { all = false } = {}) {
  const response = await fetch("/api/campaign/runs/forget", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(all ? { all: true } : { runId }),
  });
  const result = await response.json().catch(() => ({}));
  if (!response.ok || !result.ok) throw new Error(result.error || "移除失败");
  return result;
}

function restoreDismissedCampaignRuns(runIds) {
  for (const runId of runIds) delete dismissedCampaignRuns[runId];
  saveDismissedCampaignRuns();
}

function setCampaignMonitorsCollapsed(collapsed, { remember = false } = {}) {
  const container = document.getElementById("campaignMonitors");
  const toggle = document.getElementById("monitorToggle");
  container.classList.toggle("collapsed", collapsed);
  toggle.classList.toggle("collapsed", collapsed);
  toggle.setAttribute("aria-expanded", String(!collapsed));
  document.getElementById("monitorToggleLabel").textContent = collapsed ? "显示进度" : "收起进度";
  if (remember) {
    monitorDisplayChoice = collapsed ? "collapsed" : "expanded";
    sessionStorage.setItem("mamba-send-monitor-display", monitorDisplayChoice);
  }
}

function monitorRunIsActive(run) {
  const syncStatus = String(run?.state?.notionSync?.status || run?.state?.advanceStatus || "").toUpperCase();
  return run?.running === true || run?.state?.status === "RUNNING" || syncStatus === "RUNNING";
}

document.getElementById("monitorToggle").addEventListener("click", () => {
  const collapsed = document.getElementById("campaignMonitors").classList.contains("collapsed");
  setCampaignMonitorsCollapsed(!collapsed, { remember: true });
});

function renderCampaignMonitor(status, queue) {
  const supplied = Array.isArray(status?.runs) ? status.runs : [];
  const runs = supplied.length ? supplied : (status?.state ? [status] : []);
  const dismissedNow = runs.filter((item) => item?.state?.runId && dismissedCampaignRuns[item.state.runId]);
  const visible = runs.filter((item) => !item?.state?.runId || !dismissedCampaignRuns[item.state.runId]);
  const container = document.getElementById("campaignMonitors");
  const restoreButton = document.getElementById("monitorRestore");
  document.getElementById("monitorCount").textContent = String(visible.filter((item) => item?.state).length);
  restoreButton.classList.toggle("hidden", dismissedNow.length === 0);
  restoreButton.textContent = dismissedNow.length ? `恢复已关闭 (${dismissedNow.length})` : "恢复已关闭";
  // 「清掉已结束」只在真的有已结束的 campaign 时才出现。
  const finished = runs.filter((item) => item?.state && !monitorRunIsActive(item));
  const clearButton = document.getElementById("monitorClearDone");
  clearButton.classList.toggle("hidden", finished.length === 0);
  clearButton.textContent = `清掉已结束 (${finished.length})`;
  const shouldAutoCollapse = !visible.some(monitorRunIsActive) && !queue?.count;
  setCampaignMonitorsCollapsed(monitorDisplayChoice === null ? shouldAutoCollapse : monitorDisplayChoice === "collapsed");
  if (!runs.length) {
    container.innerHTML = '<div class="campaign-monitor"><div class="monitor-summary"><div class="monitor-kicker">Campaign Ready</div><div class="monitor-title">没有正在运行的 Batch</div><div class="monitor-track"><span style="width:0"></span></div></div><div class="flow-steps"><div class="flow-step"><small>01 Prepared</small><strong>等待 Batch</strong></div><div class="flow-step"><small>02 Sending</small><strong>尚未开始</strong></div><div class="flow-step"><small>03 Notion</small><strong>等待发送完成</strong></div><div class="flow-step"><small>04 Next Batch</small><strong>Queue 空</strong></div></div></div>';
    return;
  }
  if (!visible.length) {
    container.innerHTML = "";
    setCampaignMonitorsCollapsed(true);
    return;
  }
  const visibleRuns = visible
    .filter((item) => item?.state)
    .sort((a, b) => Number(b.running) - Number(a.running) || String(b.state?.updatedAt || "").localeCompare(String(a.state?.updatedAt || "")))
    .slice(0, 6);
  container.innerHTML = visibleRuns.map((run) => renderCampaignLane(run, queue)).join("");
}

function renderCampaignLane(status, queue) {
  const state = status?.state || {};
  const assignments = Array.isArray(state?.assignments) ? state.assignments : [];
  const summary = state?.summary || {};
  const total = Number(state?.total || assignments.length || 0);
  const outcomes = monitorOutcomes(state, assignments, summary);
  const done = outcomes.processed;
  const failed = outcomes.failed;
  const waiting = outcomes.pending;
  const running = status?.running === true || state?.status === "RUNNING";
  const resumable = assignments.filter((item) => item.status === "QUEUED" || /^(WAITING|SENDING)_PART\d+$/.test(item.status || "")).length;
  const displayStatus = !running && state.status === "COMPLETED" && resumable > 0 ? "INCOMPLETE" : state.status;
  const percent = outcomes.percent;
  const project = typeof state?.project === "string" ? state.project : state?.project?.name;
  const flow = state?.flowLabel || state?.templateFlow || "Flow 1 - Project Template";
  const notionStatus = String(state?.advanceStatus || state?.notionSync?.status || "").toUpperCase();
  const notionBusy = ["WAITING", "RUNNING"].includes(notionStatus);
  const notionFailed = ["FAILED", "PARTIAL"].includes(notionStatus);
  const senders = [...new Set([
    ...assignments.map((item) => item.instanceKey || item.instanceName),
    ...Object.keys(state.perSender || {}),
  ].filter(Boolean))];
  const laneQueue = (queue?.items || []).find((item) => (item.instanceNames || []).some((name) => senders.includes(name)));
  const sendingClass = running ? "active" : failed > 0 ? "held" : displayStatus === "COMPLETED" ? "done" : ["STOPPED", "INTERRUPTED", "INCOMPLETE"].includes(displayStatus) ? "held" : "";
  const notionClass = notionFailed ? "held" : notionBusy ? "active" : notionStatus === "SUCCEEDED" ? "done" : "";
  const queueClass = laneQueue ? "active" : "";
  return `<article class="campaign-monitor" data-run-id="${monitorEscape(state.runId)}">
    <div class="monitor-summary">
      <div class="monitor-head"><div class="monitor-kicker">${running ? "Campaign Running" : "Campaign"} <span class="monitor-sender">${monitorEscape(senders.join(" + ") || "No sender")}</span></div><button type="button" class="lane-dismiss" data-dismiss-run="${monitorEscape(state.runId)}" title="关闭这张进度卡；不会停止发送">× 关闭</button></div>
      <div class="monitor-title-row"><div class="monitor-title">${monitorEscape([project, flow, state.mode].filter(Boolean).join(" · "))}</div><div class="monitor-percent">${percent}%</div></div>
      <div class="monitor-track ${running ? "running" : ""}"><span style="width:${percent}%"></span></div>
      <div class="monitor-meta"><span>已触达 <b>${outcomes.contacted}</b></span><span>待处理 <b>${waiting}</b></span><span class="meta-skip">已跳过 <b>${outcomes.skipped}</b>${outcomes.noWhatsapp ? `（无 WhatsApp ${outcomes.noWhatsapp}）` : ""}</span><span class="meta-fail">发送异常 <b>${failed}</b></span><button class="lane-stop" data-stop-run="${monitorEscape(state.runId)}" ${running ? "" : "disabled"} title="停止这一个号码的 Campaign">停止</button></div>
    </div>
    <div class="flow-steps">
      <div class="flow-step done"><small>01 Prepared</small><strong>${total} 人 · ${monitorEscape(state.mode)}</strong></div>
      <div class="flow-step ${sendingClass}"><small>02 Sending</small><strong>${running ? `${done}/${total} 已处理` : failed > 0 ? `${failed} 个发送异常待检查` : displayStatus === "COMPLETED" ? "发送流程完成" : displayStatus === "INCOMPLETE" ? `${resumable} 个 Part 等待继续` : ["STOPPED", "INTERRUPTED"].includes(displayStatus) ? "已停止" : monitorEscape(displayStatus || "尚未开始")}</strong></div>
      <div class="flow-step ${notionClass}"><small>03 Notion</small><strong>${notionFailed ? `需要检查 · ${notionStatus}` : notionBusy ? `更新中 · ${notionStatus}` : notionStatus === "SUCCEEDED" ? "已同步" : "等待发送完成"}</strong></div>
      <div class="flow-step ${queueClass}"><small>04 This Sender Queue</small><strong>${laneQueue ? `${laneQueue.position}. ${monitorEscape(laneQueue.flowLabel)}` : "Queue 空"}</strong></div>
    </div>
  </article>`;
}

document.getElementById("campaignMonitors").addEventListener("click", async (event) => {
  const dismissButton = event.target.closest("[data-dismiss-run]");
  if (dismissButton) {
    const runId = dismissButton.dataset.dismissRun;
    const supplied = Array.isArray(latestCampaignStatus?.runs) ? latestCampaignStatus.runs : [];
    const run = supplied.find((item) => item?.state?.runId === runId) ||
      (latestCampaignStatus?.state?.runId === runId ? latestCampaignStatus : null);
    if (monitorRunIsActive(run) && !confirm("这批仍在运行。关闭只会收起这张进度卡，WhatsApp 发送与 Notion 收尾仍会在后台继续。确定关闭显示？")) return;
    // 已结束的就真的从清单移除（换台电脑/换浏览器都不会再冒出来）；
    // 还在跑的只能收起显示，不能动清单 —— 号码车道要靠它算。
    if (!monitorRunIsActive(run)) {
      forgetCampaignRun(runId).catch((error) => console.log("[monitor] 移除失败:", error.message));
    }
    dismissCampaignRun(runId);
    renderCampaignMonitor(latestCampaignStatus, latestCampaignQueue);
    return;
  }
  const button = event.target.closest("[data-stop-run]");
  if (!button || button.disabled) return;
  if (!confirm("只停止这个号码正在跑的 Campaign？另一个号码会继续发送。")) return;
  const response = await fetch("/api/stop", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ runId: button.dataset.stopRun }) });
  const data = await response.json().catch(() => ({}));
  if (!data.ok) alert(data.error || "停止失败。");
});

document.getElementById("monitorRestore").addEventListener("click", () => {
  const supplied = Array.isArray(latestCampaignStatus?.runs) ? latestCampaignStatus.runs : [];
  const runs = supplied.length ? supplied : (latestCampaignStatus?.state ? [latestCampaignStatus] : []);
  restoreDismissedCampaignRuns(runs.map((item) => item?.state?.runId).filter(Boolean));
  monitorDisplayChoice = "expanded";
  sessionStorage.setItem("mamba-send-monitor-display", monitorDisplayChoice);
  renderCampaignMonitor(latestCampaignStatus, latestCampaignQueue);
});

document.getElementById("monitorClearDone").addEventListener("click", async (event) => {
  const button = event.currentTarget;
  const previous = button.textContent;
  button.disabled = true;
  button.textContent = "移除中…";
  try {
    const result = await forgetCampaignRun(null, { all: true });
    // 同时清掉本机隐藏纪录，不然 localStorage 会一直留着一堆已经不存在的 runId。
    restoreDismissedCampaignRuns(result.removed.map((item) => item.runId));
    await pollRunning();
  } catch (error) {
    alert(error.message);
  } finally {
    button.disabled = false;
    button.textContent = previous;
  }
});

function hideSyncOverlay() {
  document.getElementById("syncOverlay").classList.add("hidden");
}

// Notion 同步队列（手动按「立即同步」或晚上 22:00 那轮）跑起来时，用同一个
// 弹窗告诉使用者「现在在同步哪一批」。以前只有 campaign 跑完那次收尾会弹，
// 队列在背景做事时画面完全没反应，看起来像当掉。
//
// 跟 campaign 收尾那个弹窗共用一个 overlay，所以要让路：那边正在显示时不覆盖它。
let outboxSyncBusy = false;

function showOutboxSyncOverlay({ flows = [], reason = "manual" } = {}) {
  if (syncBusy) return;   // campaign 自己的收尾优先，不要抢
  outboxSyncBusy = true;
  const overlay = document.getElementById("syncOverlay");
  overlay.classList.remove("hidden", "failed", "succeeded");
  document.getElementById("syncIcon").textContent = "⟳";
  document.getElementById("syncTitle").textContent = reason === "nightly" ? "每晚自动同步 Notion" : "正在同步到 Notion";
  const names = [...new Set(flows.map((item) => item.flowLabel).filter(Boolean))];
  document.getElementById("syncMessage").textContent = names.length
    ? `${names.join(" · ")} 的发送结果正在写回 Notion。`
    : "正在把发送结果写回 Notion。";
  document.getElementById("syncDetail").textContent = "写回去之后名单才知道这些客户已经收过，下一批才不会重复发送。请不要关掉 Mamba。";
  document.getElementById("syncTrack").classList.remove("hidden");
  document.getElementById("syncActions").classList.add("hidden");
}

function finishOutboxSyncOverlay(result) {
  if (!outboxSyncBusy) return;
  outboxSyncBusy = false;
  const overlay = document.getElementById("syncOverlay");
  const failed = Number(result?.failed || 0);
  const retried = Number(result?.retried || 0);
  overlay.classList.add(failed ? "failed" : "succeeded");
  document.getElementById("syncIcon").textContent = failed ? "!" : "✓";
  document.getElementById("syncTitle").textContent = failed ? "部分没同步成功" : "已同步到 Notion";
  document.getElementById("syncMessage").textContent = failed
    ? `${failed} 笔试到上限仍然失败，${retried} 笔会自动再试。`
    : retried
      ? `成功 ${result.completed} 笔，${retried} 笔稍后自动重试。`
      : `成功 ${result?.completed ?? 0} 笔，队列已清空。`;
  document.getElementById("syncDetail").textContent = failed
    ? "⚠️ 没同步到的客户在名单上仍然看起来没发过，下一批可能重复发送。到 System Logs 搜 outbox 看原因。"
    : "";
  document.getElementById("syncTrack").classList.add("hidden");
  // 成功就自己收起来，失败留着让人看见。
  if (!failed) setTimeout(() => { if (!syncBusy && !outboxSyncBusy) hideSyncOverlay(); }, 2200);
}

// 每晚 22:00 那轮是背景自己跑的，没有人按按钮，所以要用轮询发现它开始了。
// 手动那次由按钮自己开弹窗（反应比较快），这里只负责补上「自动跑起来」的情况。
let lastOutboxRunning = false;

async function pollOutboxSync() {
  try {
    const response = await fetch("/api/notion-outbox", { cache: "no-store" });
    if (!response.ok) return;
    const data = await response.json();
    const running = Boolean(data?.worker?.running);
    if (running && !lastOutboxRunning && !outboxSyncBusy) {
      showOutboxSyncOverlay({ flows: data.queue?.waitingFlows ?? [], reason: "nightly" });
    }
    if (!running && lastOutboxRunning && outboxSyncBusy) {
      finishOutboxSyncOverlay(data?.worker?.lastResult ?? {});
    }
    lastOutboxRunning = running;
  } catch { /* 队列没启用或读不到就当没这回事，不要影响其他轮询 */ }
}

function renderNotionSync(sync, runId, state = null) {
  const overlay = document.getElementById("syncOverlay");
  const icon = document.getElementById("syncIcon");
  const title = document.getElementById("syncTitle");
  const message = document.getElementById("syncMessage");
  const detail = document.getElementById("syncDetail");
  const track = document.getElementById("syncTrack");
  const actions = document.getElementById("syncActions");
  const recoverButton = document.getElementById("syncRecover");
  const retryButton = document.getElementById("syncRetry");
  const status = String(sync?.status || "").toUpperCase();
  const assignments = Array.isArray(state?.assignments) ? state.assignments : [];
  const pending = assignments.filter((item) => item.status === "QUEUED" || /^(WAITING|SENDING)_PART\d+$/.test(item.status || "")).length;
  const failed = assignments.filter((item) => item.status === "FAILED").length;
  const partial = assignments.filter((item) => item.part1At && item.status !== "SENT").length;
  activeSyncContext = { runId, sync, state, pending, failed, partial };
  syncBusy = status === "RUNNING";

  if (!status) return;
  overlay.classList.remove("failed", "succeeded");
  actions.classList.add("hidden");
  recoverButton.classList.add("hidden");
  retryButton.classList.add("hidden");

  if (status === "WAITING") {
    hideSyncOverlay();
    return;
  }

  if (status === "RUNNING") {
    if (successTimer) clearTimeout(successTimer);
    overlay.classList.remove("hidden");
    icon.textContent = "";
    icon.classList.add("spinning");
    title.textContent = "正在更新 Notion";
    message.textContent = sync.message || "正在保存本轮发送结果…";
    detail.textContent = "请保持 Mamba 开启。即使刷新页面，进度也会从服务器恢复；完成前请勿关闭 Mamba。";
    track.classList.remove("hidden");
    return;
  }

  icon.classList.remove("spinning");
  track.classList.add("hidden");
  if (status === "FAILED") {
    const dismissedKey = `mamba-notion-sync-dismissed:${runId || "latest"}:${sync.updatedAt || sync.finishedAt || "failed"}`;
    if (sessionStorage.getItem(dismissedKey)) return;
    overlay.classList.add("failed");
    overlay.classList.remove("hidden");
    icon.textContent = "!";
    title.textContent = "Notion 更新失败";
    if (pending || failed) {
      message.textContent = `发送在中途安全暂停：${pending} 个未发送，${failed} 个连接异常${partial ? `，其中 ${partial} 个已发送部分内容` : ""}。`;
      detail.textContent = "先检查网络、Evolution 与 WhatsApp 都恢复 ONLINE，再按「安全恢复」。已成功的客户和已经成功的 Part 都不会重发；整批真正完成后才更新 Notion。";
      recoverButton.textContent = `安全恢复 ${pending + failed} 个未完成客户`;
      recoverButton.classList.remove("hidden");
    } else {
      message.textContent = sync.message || "发送记录仍保留在本机。";
      detail.textContent = sync.error === "fetch failed"
        ? "Mamba 当时无法连接 Notion（通常是电脑关机或网络断开）。这只影响云端同步，不会重发 WhatsApp。"
        : (sync.error || "请检查网络后只重试 Notion，不会发送 WhatsApp。");
      retryButton.classList.remove("hidden");
    }
    actions.classList.remove("hidden");
    return;
  }

  if (status === "SUCCEEDED") {
    const seenKey = "mamba-notion-sync-seen:" + String(runId || sync.finishedAt || "latest");
    if (sessionStorage.getItem(seenKey)) return;
    sessionStorage.setItem(seenKey, "1");
    overlay.classList.add("succeeded");
    overlay.classList.remove("hidden");
    icon.textContent = "✓";
    title.textContent = "Notion 更新完成";
    message.textContent = sync.message || "本轮发送结果已经安全保存。";
    detail.textContent = "现在可以刷新、切换页面或关闭 Mamba。";
    successTimer = setTimeout(hideSyncOverlay, 3500);
  }
}

document.getElementById("syncClose").addEventListener("click", () => {
  const context = activeSyncContext;
  if (context?.sync?.status === "FAILED") {
    const key = `mamba-notion-sync-dismissed:${context.runId || "latest"}:${context.sync.updatedAt || context.sync.finishedAt || "failed"}`;
    sessionStorage.setItem(key, "1");
  }
  hideSyncOverlay();
  show("flow1");
});

async function postSyncRecovery(path, body, button) {
  const previous = button.textContent;
  button.disabled = true;
  button.textContent = "处理中…";
  try {
    const response = await fetch(path, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await response.json().catch(() => ({}));
    if (!response.ok || !data.ok) throw new Error(data.error || `HTTP ${response.status}`);
    hideSyncOverlay();
    show("flow1");
    return data;
  } catch (error) {
    document.getElementById("syncDetail").textContent = `恢复失败：${error.message}。本机发送记录仍然安全，请检查 Phone Health 后再试。`;
    return null;
  } finally {
    button.disabled = false;
    button.textContent = previous;
  }
}

document.getElementById("syncRecover").addEventListener("click", async () => {
  const context = activeSyncContext;
  if (!context?.runId) return;
  const wording = context.failed
    ? `会继续 ${context.pending} 个未发送客户，并重试 ${context.failed} 个连接异常。已成功的客户及已成功的 Part 不会重发。确认连接已恢复并继续？`
    : `会继续 ${context.pending} 个未发送客户；已成功的客户不会重发。确认连接已恢复并继续？`;
  if (!confirm(wording)) return;
  const endpoint = context.failed ? "/api/retry-failed" : "/api/resume";
  await postSyncRecovery(endpoint, { runId: context.runId }, document.getElementById("syncRecover"));
});

document.getElementById("syncRetry").addEventListener("click", async () => {
  const context = activeSyncContext;
  if (!context?.runId) return;
  if (!confirm("只把本机已经保存的发送结果补同步到 Notion；不会发送任何 WhatsApp。继续？")) return;
  await postSyncRecovery("/api/notion-sync/retry", { runId: context.runId }, document.getElementById("syncRetry"));
});

window.addEventListener("beforeunload", (event) => {
  if (!syncBusy) return;
  event.preventDefault();
  event.returnValue = "";
});

// 有 campaign 在跑时给对应 tab 一个呼吸灯, 并恢复 Notion 收尾状态。
async function pollRunning() {
  try {
    const r = await fetch("/api/status", { cache: "no-store" });
    const d = await r.json().catch(() => ({}));
    latestCampaignStatus = d;
    const runs = Array.isArray(d?.runs) ? d.runs : [d];
    const runningFlow1 = runs.some((item) => item?.running && !item?.state?.flowLabel);
    const runningNext = runs.some((item) => item?.running && item?.state?.flowLabel);
    document.getElementById("tab-flow1").classList.toggle("running", runningFlow1);
    document.getElementById("tab-next").classList.toggle("running", runningNext);
    renderNotionSync(d?.state?.notionSync, d?.state?.runId, d?.state);
  } catch { /* console 自己会显示, 这里只是点缀 */ }
  await pollOutboxSync();
  await refreshCampaignQueue();
  renderCampaignMonitor(latestCampaignStatus, latestCampaignQueue);
  setTimeout(pollRunning, 1500);
}

async function refreshCampaignQueue() {
  try {
    const response = await fetch("/api/campaign-queue", { cache: "no-store" });
    const data = await response.json();
    const queue = data?.queue;
    latestCampaignQueue = queue;
    const bar = document.getElementById("queueBar");
    if (!queue?.count) {
      firstQueuedRunId = null;
      bar.classList.add("hidden");
      renderCampaignMonitor(latestCampaignStatus, latestCampaignQueue);
      return;
    }
    const first = queue.items[0];
    firstQueuedRunId = first.runId;
    bar.classList.remove("hidden");
    bar.classList.toggle("held", Boolean(queue.hold));
    document.getElementById("queueCount").textContent = "Queue " + queue.count + " 批";
    document.getElementById("queueDetail").textContent = queue.hold?.reason ||
      ("下一批: " + (first.project || first.projectId) + " · " + first.flowLabel + " · " + first.total + " 人");
    document.getElementById("queueRelease").classList.toggle("hidden", !queue.hold);
    renderCampaignMonitor(latestCampaignStatus, latestCampaignQueue);
  } catch { /* Queue 状态不应影响当前发送。 */ }
}

document.getElementById("queueCancel").addEventListener("click", async () => {
  if (!firstQueuedRunId || !confirm("取消 Queue 里的下一批？不会停止当前正在发送的 Batch。")) return;
  const response = await fetch("/api/campaign-queue/cancel", {
    method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ runId: firstQueuedRunId }),
  });
  const data = await response.json();
  if (!data.ok) alert(data.error || "取消 Queue 失败。");
  await refreshCampaignQueue();
});

document.getElementById("queueRelease").addEventListener("click", async () => {
  if (!confirm("当前收尾检查没有通过。你确认已经人工检查，并仍要启动下一批吗？")) return;
  const response = await fetch("/api/campaign-queue/release", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
  const data = await response.json();
  if (!data.ok) alert(data.error || "启动下一批失败。");
  await refreshCampaignQueue();
});
pollRunning();
</script>
