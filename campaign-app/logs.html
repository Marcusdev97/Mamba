<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>System Logs · Mamba</title>
<link rel="stylesheet" href="/assets/mamba.css" />
<style>
  .toolbar { display:grid; grid-template-columns: 140px 160px 160px 1fr auto; gap:10px; align-items:end; }
  .chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
  .chips .btn { padding:10px 12px; min-height:0; font-size:14px; }
  .chips .active { border-color:var(--green); color:var(--green); }
  .level { font-weight:800; text-transform:uppercase; }
  .level.info { color:var(--blue); }
  .level.warn { color:var(--amber); }
  .level.error { color:var(--red); }
  .ctx { max-width:420px; white-space:pre-wrap; word-break:break-word; font-family:var(--font-mono); font-size:12px; color:var(--muted); }
  input[type="date"] {
    width:100%;
    min-height:48px;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--panel2);
    color:var(--text);
    padding:0 12px;
    font:inherit;
  }
  @media (max-width: 820px) { .toolbar { grid-template-columns:1fr; } }
</style>
<script src="/assets/mamba-shell.js" defer></script>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>System Logs</h1>
      <div class="sub">系统错误、警告、操作记录 · 本机 JSONL 黑盒</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <a class="btn" href="/" style="text-decoration:none">Campaign Console</a>
      <a class="btn" href="/settings" style="text-decoration:none">Settings</a>
    </div>
  </header>

  <div class="card">
    <h2>Filter</h2>
    <div class="toolbar">
      <label class="fld"><span>Level</span>
        <select id="level">
          <option value="">All</option>
          <option value="info">Info</option>
          <option value="warn">Warn</option>
          <option value="error">Error</option>
        </select>
      </label>
      <label class="fld"><span>Area</span><input id="area" type="text" placeholder="api / campaign / conversations" /></label>
      <label class="fld"><span>Date</span><input id="date" type="date" /></label>
      <label class="fld"><span>Search</span><input id="q" type="search" placeholder="timeout / Notion / Telegram..." /></label>
      <button class="btn primary" id="refresh">刷新</button>
    </div>
    <div class="chips" id="areaChips">
      <button class="btn active" data-area="">All</button>
      <button class="btn" data-area="api">API</button>
      <button class="btn" data-area="system">System</button>
      <button class="btn" data-area="campaign">Campaign</button>
      <button class="btn" data-area="conversations">Conversations</button>
      <button class="btn" data-area="settings">Settings</button>
      <button class="btn" data-area="whatsapp">WhatsApp</button>
      <button class="btn" data-area="notion">Notion</button>
      <button class="btn" data-area="telegram">Telegram</button>
    </div>
    <div class="muted" id="meta"></div>
    <div class="err" id="err"></div>
  </div>

  <div class="card">
    <h2>Recent</h2>
    <table>
      <thead><tr><th>Time</th><th>Level</th><th>Area</th><th>Event</th><th>Message</th><th>Context</th></tr></thead>
      <tbody id="rows"><tr><td colspan="6" class="muted">Loading...</td></tr></tbody>
    </table>
  </div>
</div>
<script>
const $ = (id) => document.getElementById(id);
const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
function fmt(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleString("en-MY", { hour12:false });
}
async function loadLogs() {
  $("err").textContent = "";
  const params = new URLSearchParams({ limit: "200" });
  if ($("level").value) params.set("level", $("level").value);
  if ($("area").value.trim()) params.set("area", $("area").value.trim());
  if ($("date").value) params.set("date", $("date").value);
  if ($("q").value.trim()) params.set("q", $("q").value.trim());
  try {
    const res = await fetch("/api/system-logs?" + params.toString());
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "Load failed");
    const rows = data.entries || [];
    $("meta").textContent = rows.length + " 条记录";
    $("rows").innerHTML = rows.length ? rows.map((x) => {
      const ctx = x.context && Object.keys(x.context).length ? JSON.stringify(x.context, null, 2) : "";
      return "<tr><td>" + esc(fmt(x.at)) + "</td><td class='level " + esc(x.level) + "'>" + esc(x.level) +
        "</td><td>" + esc(x.area) + "</td><td>" + esc(x.event) + "</td><td>" + esc(x.message) +
        "</td><td class='ctx'>" + esc(ctx) + "</td></tr>";
    }).join("") : '<tr><td colspan="6" class="muted">没有记录。</td></tr>';
  } catch (error) {
    $("err").textContent = error.message;
  }
}
$("refresh").addEventListener("click", loadLogs);
function syncAreaChips() {
  const area = $("area").value.trim();
  document.querySelectorAll("#areaChips .btn").forEach((button) => {
    button.classList.toggle("active", button.dataset.area === area);
  });
}
document.querySelectorAll("#areaChips .btn").forEach((button) => {
  button.addEventListener("click", () => {
    $("area").value = button.dataset.area;
    syncAreaChips();
    loadLogs();
  });
});
["level","area","date","q"].forEach((id) => $(id).addEventListener("change", () => {
  syncAreaChips();
  loadLogs();
}));
$("q").addEventListener("keydown", (e) => { if (e.key === "Enter") loadLogs(); });
syncAreaChips();
loadLogs();
</script>
</body>
</html>
