<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>号码连接 · Mamba</title>
<link rel="stylesheet" href="/assets/mamba.css" />
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>📱 号码连接</h1>
      <div class="sub">管理 WhatsApp 发送号码:扫码上线、查看状态、删除设备</div>
    </div>
    <div class="pill"><span class="dot" id="apiDot"></span><span id="apiLabel">连接中…</span></div>
  </header>

  <div class="card">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px">
      <h2 style="margin:0">WhatsApp 号码状态</h2>
      <div style="display:flex; gap:10px">
        <button class="btn" id="btnRefreshInst">⟳ 刷新</button>
        <button class="btn primary" id="btnAddNumber">+ 添加号码（扫码）</button>
      </div>
    </div>
    <table>
      <thead><tr><th>INSTANCE</th><th>STATUS</th><th>NUMBER</th><th></th></tr></thead>
      <tbody id="instBody"><tr><td colspan="4" class="muted">读取中…</td></tr></tbody>
    </table>

    <!-- QR panel -->
    <div id="qrPanel" class="hidden" style="margin-top:16px; border-top:1px solid var(--line); padding-top:16px">
      <div style="display:flex; gap:20px; align-items:flex-start; flex-wrap:wrap">
        <div style="background:#fff; padding:10px; border-radius:10px; width:230px; height:230px; display:flex; align-items:center; justify-content:center">
          <img id="qrImg" alt="QR" style="width:210px; height:210px; image-rendering:pixelated" />
        </div>
        <div style="flex:1; min-width:240px">
          <div style="font-weight:700; font-size:15px; margin-bottom:8px">为 <span id="qrName" style="color:var(--green)"></span> 扫码登录</div>
          <ol class="muted" style="font-size:13px; padding-left:18px; margin:0 0 12px">
            <li>在<b>目标手机</b>打开 WhatsApp（Business）</li>
            <li>设置 → 已连接的设备 → 链接设备</li>
            <li>扫描左边这个二维码</li>
          </ol>
          <div id="qrStatus" class="notice">等待扫描…（二维码每 25 秒自动刷新）</div>
          <div style="margin-top:12px; display:flex; gap:10px">
            <button class="btn" id="btnQrRefresh">刷新二维码</button>
            <button class="btn" id="btnQrClose">关闭</button>
          </div>
          <div class="err" id="qrErr"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="notice" style="margin-top:4px">
    号码显示 <b style="color:var(--green)">OPEN</b> 就可以发送了。API 离线的话,重新点一次控制台的「号码连接」按钮,它会自动把引擎启动起来。
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
async function post(url, body) {
  const r = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body || {}) });
  return r.json();
}
async function get(url) { return (await fetch(url)).json(); }

async function refreshInstances() {
  const btn = $("btnRefreshInst");
  if (btn) { btn.disabled = true; btn.textContent = "查询中…"; }
  $("apiLabel").textContent = "查询中…";
  const data = await get("/api/instances").catch(() => ({ online: false, instances: [] }));
  if (btn) { btn.disabled = false; btn.textContent = "⟳ 刷新"; }
  $("apiDot").className = "dot " + (data.online ? "on" : "off");
  $("apiLabel").textContent = data.online ? "API 在线" : "API 离线（先启动 Evolution）";
  const body = $("instBody");
  if (!data.instances.length) {
    body.innerHTML = '<tr><td colspan="4" class="muted">' + (data.online ? "暂无号码，点右上角添加" : (data.error || "无法连接 8080")) + "</td></tr>";
  } else {
    body.innerHTML = data.instances.map((i) => {
      const cls = i.status === "OPEN" ? "b-sent" : "b-queued";
      return "<tr><td>" + i.name + '</td><td><span class="badge ' + cls + '">' + i.status + "</span></td><td>" + i.number +
        '</td><td style="text-align:right"><button class="btn" style="padding:4px 12px; font-size:12.5px" data-del="' + i.name + '">删除</button></td></tr>';
    }).join("");
  }
}

// ---- add / delete WhatsApp numbers ----
let qrName = null;
let qrTimer = null;
let qrTicks = 0;

$("btnAddNumber").addEventListener("click", async () => {
  const label = (prompt("号码标签（留空自动取下一个，如 wa_03）：", "") || "").trim();
  $("btnAddNumber").disabled = true;
  const r = await post("/api/instance/create", { name: label || undefined });
  $("btnAddNumber").disabled = false;
  if (!r.ok) { alert(r.error); return; }
  qrName = r.instanceName;
  $("qrName").textContent = qrName;
  $("qrImg").src = r.qr;
  $("qrErr").textContent = "";
  $("qrStatus").textContent = "等待扫描…（二维码每 25 秒自动刷新）";
  $("qrPanel").classList.remove("hidden");
  $("qrPanel").scrollIntoView({ behavior: "smooth" });
  if (qrTimer) clearInterval(qrTimer);
  qrTicks = 0;
  qrTimer = setInterval(qrTick, 5000);
});

async function refreshQr() {
  if (!qrName) return;
  const r = await get("/api/instance/qr?name=" + encodeURIComponent(qrName)).catch(() => null);
  if (r && r.ok) { $("qrImg").src = r.qr; $("qrErr").textContent = ""; }
}
async function qrTick() {
  qrTicks += 1;
  const data = await get("/api/instances").catch(() => null);
  const inst = data && data.instances.find((i) => i.name === qrName);
  if (inst && inst.status === "OPEN") {
    $("qrStatus").innerHTML = "✓ <b style='color:var(--green)'>" + qrName + " 已连接：" + inst.number + "</b>";
    clearInterval(qrTimer); qrTimer = null;
    refreshInstances();
    return;
  }
  if (qrTicks % 5 === 0) refreshQr(); // every ~25s
}

$("btnQrRefresh").addEventListener("click", refreshQr);
$("btnQrClose").addEventListener("click", () => {
  $("qrPanel").classList.add("hidden");
  if (qrTimer) { clearInterval(qrTimer); qrTimer = null; }
  qrName = null;
});

$("instBody").addEventListener("click", async (e) => {
  const btn = e.target.closest("[data-del]");
  if (!btn) return;
  const name = btn.dataset.del;
  if (!confirm("删除 " + name + "？会登出该 WhatsApp 设备并删除其会话（历史发送记录保留）。")) return;
  btn.disabled = true;
  const r = await post("/api/instance/delete", { name });
  if (!r.ok) { alert(r.error); btn.disabled = false; return; }
  refreshInstances();
});

$("btnRefreshInst").addEventListener("click", refreshInstances);
refreshInstances();
// auto-refresh so the page stays live while Evolution boots / QR connects
setInterval(() => { if (!qrTimer) refreshInstances(); }, 10000);
</script>
</body>
</html>
