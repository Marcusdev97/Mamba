<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Campaign Automations · Mamba</title>
<link rel="stylesheet" href="/assets/mamba.css" />
<style>
  .wrap { max-width:1240px; }
  .auto-head { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:var(--sp-5); align-items:start; margin-bottom:var(--sp-5); }
  .auto-head h1 { margin:0; font-size:var(--fs-h1); line-height:var(--lh-h1); letter-spacing:0; }
  .auto-head .sub { margin-top:var(--sp-1); color:var(--muted); font-size:var(--fs-sub); }
  .head-actions { display:flex; align-items:center; justify-content:flex-end; gap:var(--sp-2); flex-wrap:wrap; }
  .mode-row { display:flex; align-items:center; gap:var(--sp-3); flex-wrap:wrap; margin-top:var(--sp-4); }
  .mode-note { color:var(--muted); font-size:var(--fs-tiny); }
  .mode-note.warn { color:var(--amber); }
  .grid-top { display:grid; grid-template-columns:minmax(0,1.35fr) minmax(280px,.65fr); gap:var(--sp-4); align-items:stretch; }
  .grid-main { margin-top:var(--sp-4); }
  .card { border-radius:8px; }
  .card.tight { min-height:176px; }
  .card-head { display:flex; align-items:flex-start; justify-content:space-between; gap:var(--sp-3); margin-bottom:var(--sp-3); }
  .card-head h2 { margin:0; }
  .status-stack { display:grid; gap:var(--sp-2); }
  .big-status { font-size:28px; line-height:1.1; font-weight:800; letter-spacing:0; }
  .muted { color:var(--muted); }
  .tiny { color:var(--faint); font-size:var(--fs-tiny); }
  .data-row { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:var(--sp-2); margin-top:var(--sp-4); }
  .data-cell { min-height:62px; padding:var(--sp-3); border:1px solid var(--line); border-radius:7px; background:var(--panel-2); }
  .data-cell span { display:block; color:var(--muted); font-size:var(--fs-tiny); }
  .data-cell b { display:block; margin-top:var(--sp-1); font-size:16px; overflow-wrap:anywhere; }
  .shift-track { height:10px; border:1px solid var(--line); border-radius:var(--radius-full); background:var(--panel-2); overflow:hidden; margin-top:var(--sp-4); }
  .shift-track i { display:block; width:0%; height:100%; background:var(--green); transition:width var(--t-slow) var(--ease); }
  .batch-title { display:flex; align-items:center; justify-content:space-between; gap:var(--sp-2); }
  .batch-title strong { font-size:20px; overflow-wrap:anywhere; }
  .progress-row { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:var(--sp-2); margin-top:var(--sp-4); }
  .lifecycle { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:var(--sp-2); }
  .life-item { min-height:76px; padding:var(--sp-3); border:1px solid var(--line); border-radius:7px; background:var(--panel-2); }
  .life-item b { display:block; font-size:17px; }
  .life-item span { display:block; margin-top:2px; color:var(--muted); font-size:var(--fs-tiny); }
  .life-item.hot { border-color:var(--green); background:var(--green-bg); }
  .action-row { display:flex; align-items:center; gap:var(--sp-2); flex-wrap:wrap; margin-top:var(--sp-4); }
  .summary-box { min-height:92px; padding:var(--sp-3); border:1px solid var(--line); border-radius:7px; background:var(--panel-2); white-space:pre-wrap; color:var(--muted); font-size:var(--fs-sub); }
  .empty { min-height:88px; display:grid; place-items:center; color:var(--muted); text-align:center; font-size:var(--fs-sub); }
  button[disabled] { opacity:.55; cursor:not-allowed; }
  @media (max-width:1040px) {
    .grid-top { grid-template-columns:1fr; }
    .lifecycle { grid-template-columns:repeat(2,minmax(0,1fr)); }
  }
  @media (max-width:720px) {
    .auto-head { grid-template-columns:1fr; }
    .head-actions { justify-content:flex-start; }
    .data-row, .progress-row, .lifecycle { grid-template-columns:1fr; }
  }
</style>
<script src="/assets/mamba-shell.js" defer></script>
</head>
<body>
<main class="wrap">
  <header class="auto-head">
    <div>
      <h1>Campaign Automations</h1>
      <div class="sub">10:00 上班，21:00 下班；到期就发 Flow，有回复就停下来交给你。</div>
      <div class="mode-row">
        <div class="seg" id="modeSeg" aria-label="Automation mode">
          <button type="button" data-mode="OFF">关闭</button>
          <button type="button" data-mode="TEST">TEST</button>
          <button type="button" data-mode="LIVE">LIVE</button>
        </div>
        <span id="modeNote" class="mode-note">正在读取模式...</span>
      </div>
    </div>
    <div class="head-actions">
      <a class="btn" href="/send">开新一批</a>
      <button id="checkBtn" class="btn">检查</button>
      <button id="deepBtn" class="btn">深度检查</button>
      <button id="runBtn" class="btn primary" disabled>开工</button>
      <button id="stopBtn" class="btn danger">提前放工</button>
    </div>
  </header>

  <section class="grid-top">
    <div class="card tight">
      <div class="card-head"><h2>今天这一班</h2><span id="shiftBadge" class="badge b-queued">Loading</span></div>
      <div class="status-stack">
        <div id="shiftTitle" class="big-status">读取值班状态</div>
        <div id="shiftDetail" class="muted">固定窗口 10:00–21:00。</div>
      </div>
      <div class="shift-track" aria-label="Shift progress"><i id="shiftProgress"></i></div>
      <div class="data-row">
        <div class="data-cell"><span>现在</span><b id="shiftNow">-</b></div>
        <div class="data-cell"><span>收工</span><b id="shiftEnd">21:00</b></div>
        <div class="data-cell"><span>剩余</span><b id="shiftRemaining">-</b></div>
      </div>
      <div class="progress-row">
        <div class="data-cell"><span>已发</span><b id="progressSent">0</b></div>
        <div class="data-cell"><span>待发</span><b id="progressPending">0</b></div>
        <div class="data-cell"><span>失败</span><b id="progressFailed">0</b></div>
      </div>
    </div>

    <div class="card tight">
      <div class="card-head"><h2>Today Flow</h2><span class="badge b-go" id="batchCount">0 due</span></div>
      <div id="batchEmpty" class="empty">没有到期 Flow。</div>
      <div id="batchDetails" hidden>
        <div class="batch-title"><strong id="batchProject">-</strong></div>
        <div id="batchFlow" class="muted" style="margin-top:var(--sp-2)">-</div>
      </div>
    </div>
  </section>

  <section class="grid-main">
    <section class="card">
      <div class="card-head"><h2>Lifecycle Board</h2><span id="cohortTotal" class="tiny">0 leads</span></div>
      <div id="lifecycle" class="lifecycle"><div class="empty">等待名单检查。</div></div>
    </section>
    <span id="actionMessage" class="tiny" hidden></span>
  </section>
</main>

<script>
const el = (id) => document.getElementById(id);
const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" })[char]);
let currentCheck = null;
let currentSnapshot = null;

async function api(path, options = {}) {
  const response = await fetch(path, { ...options, headers: { "Content-Type":"application/json", ...(options.headers || {}) } });
  const data = await response.json().catch(() => ({}));
  if (!response.ok || data.ok === false) throw new Error(data.error || (data.reasons || []).join(" · ") || `HTTP ${response.status}`);
  return data;
}

function setBusy(button, busy, text) {
  if (!button.dataset.label) button.dataset.label = button.textContent;
  button.disabled = busy;
  button.textContent = busy ? text : button.dataset.label;
}

function modeOf(data) {
  return data?.schedulerMode || (!data?.config?.enabled ? "OFF" : data?.config?.mode === "LIVE" ? "LIVE" : "TEST");
}

function renderMode(mode) {
  document.querySelectorAll("#modeSeg button").forEach((button) => button.classList.toggle("active", button.dataset.mode === mode));
  el("modeNote").className = `mode-note${mode === "LIVE" ? " warn" : ""}`;
  el("modeNote").textContent = mode === "OFF"
    ? "关闭后不会自动发送。"
    : mode === "LIVE"
      ? "LIVE 已显示，但真实客户自动发送仍被安全锁挡住。"
      : "TEST 会使用同一引擎，但只发给测试号码。";
}

function renderShift(shift = {}) {
  const status = shift.status || "closed";
  const mode = shift.mode || "OFF";
  const labels = { "on-shift":"ON SHIFT", "off-shift":"OFF SHIFT", closed:"CLOSED" };
  el("shiftBadge").className = `badge ${status === "on-shift" ? "b-go" : status === "off-shift" ? "b-warm" : "b-queued"}`;
  el("shiftBadge").textContent = labels[status] || "CLOSED";
  el("shiftTitle").textContent = mode === "OFF" ? "自动化关闭" : shift.stoppedToday ? "今天已提前放工" : status === "on-shift" ? "正在值班" : "窗口外安静";
  el("shiftDetail").textContent = mode === "LIVE"
    ? "LIVE 入口已选择，但安全锁会阻止真实发送。"
    : status === "off-shift"
      ? `窗口外不发送；下一班 ${shift.remainingLabel || "明天 10:00"}。`
      : `固定窗口 ${shift.workStart || "10:00"}–${shift.workEnd || "21:00"}；窗口外不发送。`;
  el("shiftNow").textContent = shift.now || "-";
  el("shiftEnd").textContent = shift.offAt || "21:00";
  el("shiftRemaining").textContent = shift.remainingLabel || "-";
  const start = 10 * 60;
  const end = 21 * 60;
  const parts = String(shift.now || "00:00").split(":").map(Number);
  const nowMinutes = (parts[0] || 0) * 60 + (parts[1] || 0);
  const percent = Math.max(0, Math.min(100, ((nowMinutes - start) / (end - start)) * 100));
  el("shiftProgress").style.width = status === "on-shift" ? `${percent}%` : "0%";
}

function renderSnapshot(data) {
  currentSnapshot = data;
  const mode = modeOf(data);
  renderMode(mode);
  renderShift(data.shift || {});
}

function renderBatch(data) {
  const batch = data.batch;
  el("batchEmpty").hidden = Boolean(batch);
  el("batchDetails").hidden = !batch;
  if (!batch) return;
  el("batchProject").textContent = batch.project;
  el("batchFlow").textContent = batch.flow;
  el("batchCount").textContent = `${batch.totalDue} due`;
}

function renderLifecycle(cohort = {}) {
  const buckets = [...(cohort.buckets || []), {
    day: "Replied", label: "Human takeover", count: cohort.replied || 0,
  }, {
    day: "Stopped", label: "Do not send", count: cohort.stopped || 0,
  }, {
    day: "Done", label: "Completed", count: cohort.completed || 0,
  }];
  el("cohortTotal").textContent = `${cohort.total || 0} leads`;
  el("lifecycle").innerHTML = buckets.length ? buckets.map((item) => `
    <div class="life-item ${Number(item.count || 0) > 0 ? "hot" : ""}">
      <b>${esc(item.count || 0)}</b>
      <span>${esc(item.day || item.label)}</span>
      <span>${esc(item.label || "")}</span>
    </div>`).join("") : '<div class="empty">No lifecycle data.</div>';
}

function renderProgress(progress = {}) {
  const failed = Number(progress.failed || 0);
  const pending = Number(progress.pending || 0);
  const sent = Number(progress.sent || 0);
  el("progressSent").textContent = sent;
  el("progressPending").textContent = pending;
  el("progressFailed").textContent = failed;
}

function renderGates(data) {
  el("actionMessage").textContent = "";
}

function renderCheck(data) {
  currentCheck = data;
  renderShift(data.shift || {});
  renderBatch(data);
  renderLifecycle(data.cohort || {});
  renderProgress(data.progress || {});
  renderGates(data);
  el("runBtn").disabled = modeOf(data) === "LIVE";
}

async function check(deep = false) {
  const button = deep ? el("deepBtn") : el("checkBtn");
  setBusy(button, true, deep ? "扫描中..." : "检查中...");
  try {
    const data = await api("/api/daily-campaign/check", { method:"POST", body:JSON.stringify({ deep }) });
    renderCheck(data);
  } catch (error) {
    el("actionMessage").textContent = error.message;
  } finally {
    setBusy(button, false, "");
  }
}

async function load() {
  try {
    const data = await api("/api/daily-campaign");
    renderSnapshot(data);
    await check(false);
  } catch (error) {
    el("modeNote").textContent = error.message;
    el("actionMessage").textContent = error.message;
  }
}

async function setMode(mode) {
  const previous = modeOf(currentSnapshot);
  renderMode(mode);
  try {
    const config = currentSnapshot?.config || {};
    const data = await api("/api/daily-campaign/config", { method:"POST", body:JSON.stringify({
      schedulerMode: mode,
      projects: config.projects || ["Binastra", "Enlace"],
      maxLeads: 5,
      requireDeepCheck: true,
    }) });
    renderSnapshot(data);
    el("actionMessage").textContent = "已保存";
    await check(false);
  } catch (error) {
    renderMode(previous);
    el("actionMessage").textContent = error.message;
  }
}

document.querySelectorAll("#modeSeg button").forEach((button) => button.addEventListener("click", () => setMode(button.dataset.mode)));
el("checkBtn").addEventListener("click", () => check(false));
el("deepBtn").addEventListener("click", () => check(true));
el("stopBtn").addEventListener("click", async () => {
  if (!confirm("今天提前放工？今天不会再自动发送，明天 10:00 再继续。")) return;
  setBusy(el("stopBtn"), true, "收工中...");
  try {
    const data = await api("/api/daily-campaign/stop-shift", { method:"POST", body:"{}" });
    renderSnapshot(data);
    await check(false);
  } catch (error) {
    el("actionMessage").textContent = error.message;
  } finally {
    setBusy(el("stopBtn"), false, "");
  }
});
el("runBtn").addEventListener("click", async () => {
  const mode = modeOf(currentCheck || currentSnapshot);
  if (mode === "LIVE") return;
  if (mode === "OFF") {
    await setMode("TEST");
    return;
  }
  if (currentCheck?.shift?.status !== "on-shift") {
    const when = currentCheck?.shift?.remainingLabel || "明天 10:00";
    alert(`已开工。现在窗口外，不会发送；下一班 ${when} 自动检查。`);
    await load();
    return;
  }
  if (!currentCheck?.ready) {
    alert("现在还没通过安全检查，不会发送。");
    return;
  }
  const batch = currentCheck.batch;
  if (!confirm(`现在开工跑 ${batch.project} · ${batch.flow}？\n只会发给 Settings 里的 TEST 号码。`)) return;
  setBusy(el("runBtn"), true, "启动中...");
  try {
    const data = await api("/api/daily-campaign/run-test", { method:"POST", body:"{}" });
    alert(`TEST 已启动：${data.readiness.batch.project} · ${data.readiness.batch.flow}`);
    await load();
  } catch (error) {
    alert(`没有发送：${error.message}`);
    await check(false);
  } finally {
    setBusy(el("runBtn"), false, "");
    el("runBtn").disabled = modeOf(currentCheck) === "LIVE";
  }
});

load();
setInterval(load, 60000);
</script>
</body>
</html>
