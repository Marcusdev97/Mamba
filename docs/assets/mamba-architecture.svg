<svg viewBox="0 0 720 580" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <title>Mamba 推荐架构:本地优先,SQLite 为运行真相源,Notion 异步镜像</title>
  <desc>操作者通过 Mamba Server 操作;Mamba 与 Evolution 收发 WhatsApp;所有运行数据即时读写本机 SQLite;SQLite 再由 Sync Worker 异步双向同步到 Notion 面板。</desc>
  <rect x="0" y="0" width="720" height="580" fill="#ffffff"/>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#6b6b6b"/>
    </marker>
  </defs>

  <g stroke="#6b6b6b" stroke-width="1.6" fill="none" marker-end="url(#ah)" marker-start="url(#ah)">
    <line x1="130" y1="108" x2="130" y2="166" marker-start="none"/>
    <line x1="222" y1="202" x2="438" y2="202"/>
    <line x1="530" y1="166" x2="530" y2="108"/>
    <line x1="130" y1="238" x2="130" y2="306"/>
    <line x1="130" y1="378" x2="130" y2="436"/>
  </g>

  <g font-size="11" fill="#6b6b6b" text-anchor="middle">
    <text x="130" y="150">打开面板 :8787</text>
    <text x="330" y="192">发送指令 / 回复 webhook</text>
    <text x="548" y="150" text-anchor="start">WhatsApp</text>
    <rect x="150" y="262" width="132" height="20" rx="10" fill="#ffffff"/>
    <text x="216" y="276" text-anchor="start" fill="#1a1a1a" font-weight="600">即时读写</text>
    <rect x="150" y="399" width="196" height="20" rx="10" fill="#ffffff"/>
    <text x="216" y="413" text-anchor="start" fill="#1a1a1a" font-weight="600">Sync Worker · 异步双向</text>
  </g>

  <g>
    <rect x="40" y="44" width="180" height="64" rx="10" fill="#f3f3f0" stroke="#d9d9d3" stroke-width="1.4"/>
    <text x="130" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">操作者 Marcus</text>
    <text x="130" y="94" text-anchor="middle" font-size="11" fill="#6b6b6b">在网页上点按钮</text>

    <rect x="440" y="44" width="180" height="64" rx="10" fill="#f3f3f0" stroke="#d9d9d3" stroke-width="1.4"/>
    <text x="530" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">客户 · WhatsApp</text>
    <text x="530" y="94" text-anchor="middle" font-size="11" fill="#6b6b6b">收群发 / 回复</text>

    <rect x="40" y="170" width="182" height="68" rx="10" fill="#f3f3f0" stroke="#d9d9d3" stroke-width="1.4"/>
    <text x="131" y="200" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Mamba Server :8787</text>
    <text x="131" y="219" text-anchor="middle" font-size="11" fill="#6b6b6b">核心大脑 · 所有逻辑</text>

    <rect x="438" y="170" width="182" height="68" rx="10" fill="#f3f3f0" stroke="#d9d9d3" stroke-width="1.4"/>
    <text x="529" y="200" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Evolution API :8080</text>
    <text x="529" y="219" text-anchor="middle" font-size="11" fill="#6b6b6b">WhatsApp 引擎</text>

    <rect x="34" y="308" width="194" height="70" rx="10" fill="#e7f0fe" stroke="#2f6df6" stroke-width="2.2"/>
    <text x="131" y="339" text-anchor="middle" font-size="16" font-weight="800" fill="#12203a">SQLite</text>
    <text x="131" y="358" text-anchor="middle" font-size="11" fill="#2f6df6" font-weight="600">本机真相源 · 热路径</text>

    <rect x="40" y="438" width="182" height="68" rx="10" fill="#f3f3f0" stroke="#b9b9b3" stroke-width="1.6" stroke-dasharray="6 4"/>
    <text x="131" y="468" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Notion</text>
    <text x="131" y="487" text-anchor="middle" font-size="11" fill="#6b6b6b">云端镜像 · 人看的面板</text>
  </g>

  <g font-size="11" fill="#6b6b6b">
    <rect x="300" y="300" width="20" height="14" rx="3" fill="#e7f0fe" stroke="#2f6df6" stroke-width="2"/>
    <text x="328" y="311" text-anchor="start">运行热路径核心(不可断)</text>
    <rect x="300" y="326" width="20" height="14" rx="3" fill="#f3f3f0" stroke="#b9b9b3" stroke-width="1.6" stroke-dasharray="5 3"/>
    <text x="328" y="337" text-anchor="start">异步同步(断了不影响发送)</text>
    <text x="300" y="366" text-anchor="start" fill="#1a1a1a" font-weight="600">铁律:Notion 永不进发送/回复的关键路径</text>
  </g>
</svg>
